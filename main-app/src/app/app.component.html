<div class="shell">
  <header class="topbar">
    <div class="brand">
      <span class="title">微前端主应用</span>
      <span class="badge">Host</span>
    </div>

    <nav class="nav">
      <button
        class="btn"
        [class.active]="isActive('/home')"
        (click)="goHostHome()"
      >
        主应用
      </button>
      <button
        class="btn"
        [class.active]="isActive('/sub-app')"
        (click)="goSubApp1()"
      >
        子应用1
      </button>
      <button
        class="btn"
        [class.active]="isActive('/sub2-app2')"
        (click)="goSubApp2()"
      >
        子应用2
      </button>
      <button class="btn" [class.active]="isActive('/cloud-advisor')" (click)="goHostAd()">
        Cloud Advisor
      </button>
    </nav>
  </header>
  <router-outlet></router-outlet>
  <div id="container"></div>
  <main class="content">
  </main>
</div>
