<div class="editor-page">
  <div class="toolbar">
    <button type="button" (click)="saveWorkflow()" [disabled]="loading">保存</button>
    <button type="button" (click)="loadWorkflow()" [disabled]="loading">回显</button>
    <button type="button" (click)="resetWorkflow()" [disabled]="loading">清空</button>

    <span class="workflow-info">
      当前流程：{{ workflow?.name }}（{{ workflow?.id }}）
    </span>
  </div>

  <div class="main-layout">
    <app-node-palette [graph]="graph" [workflow]="workflow"
      (nodeDropRequested)="onNodeDropRequested($event)"></app-node-palette>

    <app-graph-canvas [workflow]="workflow" (graphReady)="onGraphReady($event)" (nodeSelected)="onNodeSelected($event)"
      (edgeCreated)="onEdgeCreated($event)"></app-graph-canvas>

    <div class="right-panel">
      <h3>节点信息</h3>

      <ng-container *ngIf="selectedNode; else emptyNode">
        <div><strong>ID：</strong>{{ selectedNode.id }}</div>
        <div><strong>名称：</strong>{{ selectedNode.name }}</div>
        <div><strong>类型：</strong>{{ selectedNode.type }}</div>
      </ng-container>

      <ng-template #emptyNode>
        <div>请先点击画布中的节点</div>
      </ng-template>
    </div>
  </div>
</div>
