上传

<input multiple type="file" (change)="onChange($event)">

<div *ngIf="progress">
    上传进度：{{ progress }}%
</div>

<button type="button" (click)="cancel()" [disabled]="!uploadSub">
    取消上传
</button>


<div id="app">
    <div class="viewport" id="viewport">
        <div class="phantom" id="phantom"></div>
        <div class="list" id="list"></div>
    </div>
</div>
