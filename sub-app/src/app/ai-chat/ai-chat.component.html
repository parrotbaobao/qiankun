<div class="ai-chat">
  <header class="ai-header">
    <h3>AI 聊天</h3>
  </header>

  <section class="ai-body" #scrollContainer>
    <div class="messages">
      <div *ngFor="let m of messages" class="msg" [ngClass]="m?.from">
        <ng-container *ngIf="m.from === 'ai'">
          <ng-container *ngIf="m?.loading; else contentTpl">
            <span class="typing"> <i></i><i></i><i></i> </span>
          </ng-container>
          <ng-template #contentTpl>
            <span class="text">{{ m.text }}</span>
          </ng-template>
        </ng-container>
        <ng-container *ngIf="m.from === 'user'">
          <span class="text">{{ m.text }}</span>
        </ng-container>
      </div>
    </div>
  </section>

  <footer class="ai-footer">
    <input
      [(ngModel)]="inputText"
      placeholder="输入消息..."
      (keydown.enter)="send()"
    />
    <button (click)="send()">发送</button>
    <button (click)="stop()">停止</button>
  </footer>
</div>
