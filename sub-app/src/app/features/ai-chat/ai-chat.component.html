<div class="ai-chat">
  <header class="ai-header">
    <h3>{{ 'aiChat.pageTitle' | translate }}</h3>
  </header>

  <section class="ai-body" #scrollContainer>
    <div class="messages">
      <div *ngFor="let m of messages" class="msg" [ngClass]="m?.from">
        <ng-container *ngIf="m.from === 'ai'">
          <ng-container *ngIf="m?.loading; else contentTpl">
            <span class="typing"> <i></i><i></i><i></i> </span>
          </ng-container>
          <ng-template #contentTpl>
            <span class="text">{{ m.text }}</span>
          </ng-template>
        </ng-container>
        <ng-container *ngIf="m.from === 'user'">
          <span class="text">{{ m.text }}</span>
        </ng-container>
      </div>
    </div>
  </section>

  <footer class="ai-footer">
    <input [(ngModel)]="inputText" [placeholder]="'aiChat.messagePlaceholder' | translate" (keydown.enter)="send()" />
    <button (click)="send()">{{ 'aiChat.sendButton' | translate }}</button>
    <button (click)="stop()">{{ 'aiChat.stopButton' | translate }}</button>
  </footer>
</div>
