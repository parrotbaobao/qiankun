<div class="node-palette">
  <div class="palette-header">
    <span class="palette-title">节点库</span>
  </div>

  <div class="palette-list">
    <div #paletteItem class="node-item" *ngFor="let item of paletteItems">
      <div class="node-card" [class.is-condition]="item.type === 'condition'">
        <div class="node-card-top">
          <span class="node-card-title">{{ item.label }}</span>
          <span *ngIf="item.method" class="node-card-method">{{ item.method }}</span>
        </div>
        <div class="node-card-sub">
          {{ item.type === 'api' ? (item.templateKey || 'api-template') : 'branch-condition' }}
        </div>
      </div>
    </div>
  </div>
</div>
